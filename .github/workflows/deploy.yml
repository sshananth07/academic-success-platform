name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Backend checks ─────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports resolve
        run: python -c "from app.main import app; print('Backend import OK')"
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          REDIS_URL: redis://localhost:6379
          GEMINI_API_KEY: fake
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_ANON_KEY: fake
          SUPABASE_JWT_SECRET: fake-secret-at-least-32-chars-long!!
          CLIENT_URL: http://localhost:5173

  # ── Frontend checks ────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com
          VITE_SUPABASE_URL: https://fake.supabase.co
          VITE_SUPABASE_ANON_KEY: fake-anon-key

  # ── Deploy to Render (master only) ────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy backend
        run: |
          curl -fsSL --retry 3 \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Deploy frontend
        run: |
          curl -fsSL --retry 3 \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

      - name: Wait and verify backend health
        run: |
          echo "Waiting 60s for services to start..."
          sleep 60
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/api/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "Backend health check failed after retries"
          exit 1
