services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: academic-success-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: academic-success-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: academic-success-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 10000

  # ── Frontend (React/Vite — static site) ───────────────────────────────────
  - type: web
    name: academic-success-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: academic-success-db
    plan: free

  - name: academic-success-redis
    plan: free
    ipAllowList: []
